name: Ruby Gem

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build + Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Install Ruby via rbenv and ruby-build
      run: |
        sudo apt-get update
        sudo apt-get install -y git build-essential libssl-dev libreadline-dev zlib1g-dev
        git clone https://github.com/rbenv/rbenv.git ~/.rbenv
        echo "$HOME/.rbenv/bin" >> $GITHUB_PATH
        echo "$HOME/.rbenv/shims" >> $GITHUB_PATH
        git clone https://github.com/rbenv/ruby-build.git ~/.rbenv/plugins/ruby-build
        ~/.rbenv/plugins/ruby-build/install.sh
        ~/.rbenv/bin/rbenv install 2.6.1
        ~/.rbenv/bin/rbenv global 2.6.1
        ~/.rbenv/versions/2.6.1/bin/ruby -v

    - name: Publish to GPR
      run: |
        mkdir -p $HOME/.gem
        touch $HOME/.gem/credentials
        chmod 0600 $HOME/.gem/credentials
        printf -- "---\n:github: ${GEM_HOST_API_KEY}\n" > $HOME/.gem/credentials
        gem build *.gemspec
        gem push --KEY github --host https://rubygems.pkg.github.com/${OWNER} *.gem
      env:
        GEM_HOST_API_KEY: "Bearer ${{secrets.GITHUB_TOKEN}}"
        OWNER: ${{ github.repository_owner }}

    - name: Publish to RubyGems
      run: |
        mkdir -p $HOME/.gem
        touch $HOME/.gem/credentials
        chmod 0600 $HOME/.gem/credentials
        printf -- "---\n:rubygems_api_key: ${GEM_HOST_API_KEY}\n" > $HOME/.gem/credentials
        gem build *.gemspec
        gem push *.gem
      env:
        GEM_HOST_API_KEY: "${{secrets.RUBYGEMS_AUTH_TOKEN}}"

name: Jekyll site CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    # Use actions/jekyll-build-pages instead of the mutable jekyll/builder:latest Docker image.
    # This ensures deterministic, GitHub Pages-compatible builds that avoid Bundler/RubyGems
    # version drift caused by floating Docker tags.
    - name: Build with Jekyll (GitHub Pages toolchain)
      uses: actions/jekyll-build-pages@v1
      with:
        source: ./
        destination: ./_site

name: "Ruby on Rails CI"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@78c01b705fd9d5ad960d432d3a0cfa341d50e410 # v1.179.1
        with:
          bundler-cache: true

      - name: Run tests if Rails app present
        run: |
          if [ -f "bin/rails" ]; then
            bin/rails test
          else
            echo "No Rails app detected - skipping tests."
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@78c01b705fd9d5ad960d432d3a0cfa341d50e410 # v1.179.1
        with:
          bundler-cache: true

      - name: Lint Ruby files if RuboCop present
        run: |
          if bundle exec rubocop --version > /dev/null 2>&1; then
            bundle exec rubocop --parallel
          else
            echo "RuboCop not in Gemfile - skipping lint."
          fi
